name: Build validator image

on:
  push:
    branches:
      - 'deploy-build-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/kacper-wolkiewicz-reef/test-subnet-validator
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment from branch
        run: |
          set -e
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" != deploy-build-* ]]; then
            echo "Unsupported branch: $BRANCH" >&2
            exit 1
          fi
          echo "ENVIRONMENT=${BRANCH#deploy-build-}" >> "$GITHUB_ENV"

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./validator
          file: ./validator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}-${{ env.ENVIRONMENT }}:v0-latest
            ${{ env.IMAGE }}-${{ env.ENVIRONMENT }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
