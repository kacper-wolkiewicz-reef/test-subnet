services:
  subtensor:
    image: ghcr.io/opentensor/subtensor-localnet:devnet-ready
    ports:
      - "9944:9944"
      - "9933:9933"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9944'"]
      interval: 5s
      timeout: 3s
      retries: 10

  pylon:
    image: backenddevelopersltd/bittensor-pylon:latest
    ports:
      - "8000:8000"
    environment:
      PYLON_BITTENSOR_NETWORK: "ws://subtensor:9944"
      PYLON_OPEN_ACCESS_TOKEN: "${VALIDATOR_PYLON_OPEN_ACCESS_TOKEN:?}"
      PYLON_IDENTITIES: '["${VALIDATOR_PYLON_IDENTITY_NAME:?}"]'
      PYLON_BITTENSOR_WALLET_PATH: "/wallets"
      PYLON_TEMPO: "${SUBNET_TEMPO:?}"
      # Identity: maps identity name to the validator wallet created by bootstrap
      PYLON_ID_VALIDATOR_WALLET_NAME: "${VALIDATOR_PYLON_IDENTITY_NAME:?}"
      PYLON_ID_VALIDATOR_HOTKEY_NAME: "default"
      PYLON_ID_VALIDATOR_NETUID: "${NETUID:?}"
      PYLON_ID_VALIDATOR_TOKEN: "${VALIDATOR_PYLON_IDENTITY_TOKEN:?}"
      # Sync pylon's notion of block duration with subtensor-localnet fast-blocks (~250 ms).
      PYLON_BLOCK_DURATION_SECONDS: "0.25"
    volumes:
      - ./wallets:/wallets:ro
    depends_on:
      subtensor:
        condition: service_healthy
